services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: always
    ports:
      - 80:80
      - 81:81
      - 443:443
    volumes:
      - /mnt/Drive1/NginxProxyManager/data:/data
      - /mnt/Drive1/NginxProxyManager/letsencrypt:/etc/letsencrypt
networks: {}
