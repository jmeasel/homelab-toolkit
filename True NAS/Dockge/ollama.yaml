services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_CTX=4096
    ports:
      - 11434:11434
    volumes:
      - ollama_data:/root/.ollama
volumes:
  ollama_data: null
networks: {}
